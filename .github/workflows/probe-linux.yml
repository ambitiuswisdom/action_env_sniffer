name: Probe Linux Runner Environment

on:
  workflow_dispatch: # 允许手动触发
  push:
    paths:
      - '.github/workflows/probe-linux.yml' 
  schedule:
    - cron: '0 0 */15 * *'

jobs:
  explore-linux:
    runs-on: ${{ matrix.runner }} # 使用最新的 Ubuntu 运行环境
    strategy:
      matrix:
        runner: [ubuntu-latest, ubuntu-slim]
    
    steps:
      - name: 1. 检查操作系统与内核详细信息 (OS & Kernel)
        run: |
          echo -e "\e[1;33m=== 操作系统信息 ===\e[0m"
          cat /etc/os-release
          echo -e "\e[1;33m=== 内核版本 ===\e[0m"
          uname -srvm

      - name: 2. 检查 CPU 与 内存信息 (Hardware)
        run: |
          echo -e "\e[1;33m=== CPU 信息 ===\e[0m"
          lscpu | grep -E '^Architecture|^CPU\(s\)|^Model name|^Thread|^Core|^Socket'
          echo ""
          echo -e "\e[1;33m=== 内存 信息 ===\e[0m"
          free -h

      - name: 3. 检查磁盘空间 (Disk Space)
        run: |
          echo -e "\e[1;33m=== 磁盘挂载与空间状态 ===\e[0m"
          # 过滤掉虚拟文件系统（如 tmpfs, devtmpfs, squashfs 等）以保持整洁
          df -hT | grep -vE 'tmpfs|devtmpfs|squashfs'

      - name: 4. 检查当前用户与权限 (User & Privileges)
        run: |
          echo -e "\e[1;33m=== 当前用户 ===\e[0m"
          id
          echo ""
          echo -e "\e[1;33m=== Sudo 权限 (是否支持免密 Sudo) ===\e[0m"
          sudo -n true && echo "✅ 支持免密 Sudo (Passwordless Sudo is Enabled)" || echo "❌ 不支持免密 Sudo"

      - name: 5. 检查所有环境变量 (Environment Variables)
        run: |
          echo -e "\e[1;33m=== 环境变量列表 ===\e[0m"
          printenv | sort

      - name: 6. 检查 PATH 路径 (PATH Variable)
        run: |
          echo -e "\e[1;33m=== PATH 环境变量解析 ===\e[0m"
          echo $PATH | tr ':' '\n'

      - name: 7. 全面检查预装工具版本 (Comprehensive Tool Check)
        run: |
          # 定义需要探测的工具列表及对应命令 (格式：名称|命令)
          tools=(
            # 版本控制
            "Git|git --version"
            "GitHub CLI|gh --version"
            
            # 前端与 JS 生态
            "Node.js|node --version"
            "npm|npm --version"
            "Yarn|yarn --version"
            "pnpm|pnpm --version"
            
            # Python 生态
            "Python 3|python3 --version"
            "pip|pip3 --version"
            "Miniconda|conda --version"
            
            # Java 生态
            "Java|java -version"
            "Maven|mvn --version | head -n 1"
            "Gradle|gradle --version | grep '^Gradle '"
            
            # C / C++ 编译与工具链
            "GCC|gcc --version | head -n 1"
            "G++|g++ --version | head -n 1"
            "Clang|clang --version | head -n 1"
            "Make|make --version | head -n 1"
            "CMake|cmake --version | head -n 1"
            "Ninja|ninja --version"
            
            # 其他后端与系统语言
            "Go|go version"
            "Rust (rustc)|rustc --version"
            "Rust (Cargo)|cargo --version"
            "Ruby|ruby -v"
            "PHP|php -v | head -n 1"
            "Perl|perl -v | grep 'This is perl'"
            ".NET SDK|dotnet --info"
            
            # 云端、DevOps 与 IaC
            "Docker|docker --version"
            "Docker Compose|docker compose version"
            "Azure CLI|az --version | head -n 1"
            "AWS CLI|aws --version"
            "Google Cloud CLI|gcloud --version | head -n 1"
            "Terraform|terraform --version | head -n 1"
            "Ansible|ansible --version | head -n 1"
            
            # 系统工具
            "cURL|curl -V | head -n 1"
            "Wget|wget -V | head -n 1"
            "jq (JSON Processor)|jq --version"
          )

          echo -e "\e[1;33m=== 开始全面扫描预装工具版本 ===\e[0m\n"

          for entry in "${tools[@]}"; do
            # 拆分名称和命令
            name="${entry%%|*}"
            cmd="${entry#*|}"
            
            # 使用青色 (Cyan) 高亮显示工具名
            echo -e "\e[1;36m[$name]\e[0m"
            
            # 执行命令，将标准错误合并到标准输出，如果失败则输出灰色提示
            eval "$cmd 2>&1" || echo -e "\e[1;30m未安装 或 无法执行\e[0m"
            echo ""
          done

      - name: 8. 检查网络配置 (Network)
        run: |
          echo -e "\e[1;33m=== IP 配置 ===\e[0m"
          ip -brief addr show

      - name: 9. 检查默认工作目录与系统根目录 (Workspace Directory)
        run: |
          echo "当前工作目录 (PWD): $PWD"
          echo "GitHub Workspace: $GITHUB_WORKSPACE"
          echo -e "\n\e[1;33m=== 根目录 (/) 内容 ===\e[0m"
          ls -la / | awk '{print $9, $10, $11}' | tail -n +4
